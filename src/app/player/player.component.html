<div id="videoContainer" #videoContainer>
    <!-- <div id="subtitleIconPlacer">
        <img src="assets/subtitles.png" id="subtitleBtn" (click)="toggleSubtitle()">
    </div>
     -->
    <video *ngIf="!useExoPlayer" id="video" #videoElem (click)="playPause()">
        <track *ngIf="subtitle" [src]="subtitleUrl" kind="subtitles" srclang="en" label="English">
    </video>
    
    <div *ngIf="!useExoPlayer">
        <div id="controls" (mouseleave)="hideControls()">
            <div id="seekSpace" 
                 (click)="seekBarClick($event)"
                 (mousedown)="onSeekBarMouseDown($event)"
                 (mousemove)="onSeekBarMouseMove($event)"
                 (mouseup)="onSeekBarMouseUp($event)"
                 (mouseleave)="onSeekBarMouseLeave()">
                <div id="seekBar" #seekBar></div>
            </div>

            <div *ngIf="show">
                <div class="skipIntro" #controls>
                    <p>Skip Intro</p>
                </div>
            </div>

            <div id="centerBtns">
                <img src="assets/skipBack.png" class="skipButtons" #controlBtns (click)="skipButtons(-30)">
                <img src="assets/left.png" class="skipButtons" #controlBtns (click)="skipButtons(-15)">
                
                <div *ngIf ="paused">
                    <img src="assets/play.png" class="playPauseBtn" #controlBtns (click)="playPause()">
                </div>
                <div *ngIf ="!paused">
                    <img src="assets/pause.png" class="playPauseBtn" #controlBtns (click)="playPause()">
                </div>
                
                <img src="assets/right.png" class="skipButtons" #controlBtns (click)="skipButtons(+15)">
                <img src="assets/skipForward.png" class="skipButtons" #controlBtns (click)="skipButtons(+30)">
                
                <!-- Audio Track Selection Button -->
                <div *ngIf="hasMultipleAudioTracks" class="audioTrackBtn" #controlBtns (click)="toggleAudioTrackList()" title="Select Audio Track">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="white">
                        <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                    </svg>
                </div>
            </div>
            
            <!-- Audio Track Selection List -->
            <div *ngIf="showAudioTrackList && hasMultipleAudioTracks" class="audioTrackList">
                <div class="audioTrackListTitle">Select Audio Track</div>
                <div *ngFor="let track of availableAudioTracks; let i = index" 
                     class="audioTrackItem" 
                     [class.selected]="i === currentAudioTrackIndex"
                     (click)="selectAudioTrack(i)">
                    {{ track.label || track.language || 'Track ' + (i + 1) }}
                </div>
            </div>

            <div *ngIf="show">
                <div class="nextEpisode" #controls (click)="getNextEp()">
                    <p>Next Episode</p>
                </div>
            </div>
        </div>
    </div>
</div>
